version: '3.8'

services:
  ad-map-api:
    build: .
    container_name: ad-map-backend
    ports:
      - "5000:5000"
      - "7001:7001"
    volumes:
      - ./Data:/app/data
      - ./certs:/app/certs
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=https://+:7001;http://+:5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ad-map-network

  nginx:
    image: nginx:alpine
    container_name: ad-map-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - ad-map-api
    restart: unless-stopped
    networks:
      - ad-map-network

networks:
  ad-map-network:
    driver: bridge
